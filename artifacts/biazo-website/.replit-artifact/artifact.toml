kind = "web"
previewPath = "/"
title = "Biazo International Website"
version = "1.0.0"
id = "artifacts/biazo-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23834

[services.development]
run = "pnpm --filter @workspace/biazo-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biazo-website", "run", "build" ]
publicDir = "artifacts/biazo-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23834"
BASE_PATH = "/"
